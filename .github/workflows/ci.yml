name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -m "not slow" --cov=cnn_mnist --cov-report=term-missing --cov-fail-under=80
      - run: python -m ruff check .
      - run: python -m mypy cnn_mnist --ignore-missing-imports
      - run: python -m compileall cnn_mnist
